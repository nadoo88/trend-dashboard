name: daily-update

on:
  schedule:
    - cron: "0 23 * * *"   # 매일 23:00 UTC = 08:00 KST
  workflow_dispatch:        # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 데이터 수집 (data.json 생성)
        run: python scripts/update_data.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "trend-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git commit -m "data: daily update $(TZ=Asia/Seoul date +%F)" || echo "변경 없음"
          git push
